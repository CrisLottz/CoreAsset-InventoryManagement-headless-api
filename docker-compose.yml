version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coreasset_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: coreasset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: coreasset_redis
    restart: unless-stopped
    # 1. Forzamos a Redis a exigir contraseña al arrancar
    command: redis-server --requirepass "T3mpP@ssw0rd2026!"
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coreasset_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # 2. Inyectamos la contraseña en la URI de conexión (redis://:password@host:port/db)
      - REDIS_URL=redis://:T3mpP@ssw0rd2026!@redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coreasset_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: