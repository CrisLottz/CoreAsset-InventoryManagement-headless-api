version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coreasset_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: coreasset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: coreasset_redis
    restart: unless-stopped
    command: redis-server --requirepass "T3mpP@ssw0rd2026!"
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coreasset_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    # Diseño serio: Inyección directa a memoria del SO
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: